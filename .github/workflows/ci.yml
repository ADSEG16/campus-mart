name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend deps
        run: |
          cd server
          npm install

      - name: Run backend tests
        run: |
          cd server
          npm test